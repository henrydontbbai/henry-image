name: ci

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run top-level help
        run: python ./scripts/henry_image.py --help
      - name: Run generate help
        run: python ./scripts/henry_image.py generate --help
      - name: Run quick validation
        run: python ./scripts/henry_image.py quick_validate

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install pytest -r requirements-test.txt
      - name: Run hygiene tests
        run: python -m pytest -q tests/test_repo_hygiene.py

  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install pytest -r requirements-test.txt
      - name: Run contract tests
        run: python -m pytest -q tests/test_contract.py tests/test_jobs.py tests/test_request_layer.py tests/test_workflow_profile.py

  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install pytest -r requirements-test.txt
      - name: Run pytest
        run: python -m pytest -q
      - name: Run quick validation
        run: python .\scripts\henry_image.py quick_validate

  macos:
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install pytest -r requirements-test.txt
      - name: Run pytest
        run: python -m pytest -q
      - name: Run quick validation
        run: python ./scripts/henry_image.py quick_validate

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install pytest -r requirements-test.txt
      - name: Run pytest
        run: python -m pytest -q
